<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"> -->
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
            background-color: hsl(257, 78%, 2%);
            font-family: "Popins", sans-serif;
            color: white;
        }

        .card {
            width: 450px;
            height: 220px;

            background-color: rgba(0, 0, 255, 0);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            border-radius: 20px;
            overflow: hidden;
        }

        .card h2 {
            z-index: 2;
            font-size: 2em;
        }

        .card::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #00b7ff, #ff30ff);
            animation: rotate 3s ease-in-out infinite;
        }


        @keyframes rotate {
            0%{
                background: #00b7ff;
            }
            50%{
                background: #ff30ff;
            }
            100%{
                background: #00b7ff;
            }
        }
        .card::after {
            content: "";
            position: absolute;
            inset: 2.5px;
            border-radius: 15px;

            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.966);
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>Card</h2>
    </div>

    <!-- <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script> -->
</body>

</html>
